spring.datasource.url=jdbc:oracle:thin:@legacy-host:1521/ORCLCDB
spring.datasource.username=legacy_app
spring.datasource.password=oracle-password
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=2000
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.env.show-values=always
server.error.include-message=always
server.error.include-binding-errors=always
legacy.audit.endpoint=http://legacy-audit.local/export
legacy.audit.mask-pii=false
legacy.support.contact=support@legacy.example
legacy.feature.toggle=true
